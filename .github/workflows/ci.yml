name: QuickPOS CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ feature/* ]

jobs:
  # This job satisfies Stage 10 & 11 of your requirements
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Validate Jira ID
        run: |
          commit_msg=$(git log -1 --pretty=%B)
          if [[ ! $commit_msg =~ "QP-" ]]; then
            echo "Jira ID missing in commit message"
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Syntax Check
        run: php -l index.php

      - name: Run Automated Tests
        # Using the direct path to ensure the pipeline finds your tests
        run: ./vendor/bin/phpunit tests/FormTest.php