name: QuickPOS CI Pipeline
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Jira ID in Branch or Commit
        run: |
          # Check if QP- is in the branch name OR the commit message
          STR="${{ github.head_ref }}${{ github.ref_name }}$(git log -1 --pretty=%B)"
          if [[ "$STR" == *"QP-"* ]]; then 
            echo "SUCCESS: Jira ID Found"; 
          else 
            echo "ERROR: No Jira ID found in branch name or commit"; 
            exit 1; 
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Syntax Check
        run: php -l index.php

      - name: Run Automated Tests
        run: vendor/bin/phpunit tests/FormTest.php
      #