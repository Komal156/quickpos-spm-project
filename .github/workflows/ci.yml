name: QuickPOS CI Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main

jobs:

  # ── Stage 1 & 10: Checkout + Jira commit validation ─────────────────────────
  validate:
    name: Validate Commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Jira ID in Branch or Commit
        run: |
          STR="${{ github.head_ref }}${{ github.ref_name }}$(git log -1 --pretty=%B)"
          if [[ "$STR" == *"QP-"* ]]; then
            echo "SUCCESS: Jira ID found"
          else
            echo "ERROR: No Jira ticket ID (QP-XXX) found in branch name or commit message"
            exit 1
          fi

  # ── Stage 3: Code Quality (runs in parallel with 'test') ────────────────────
  code-quality:
    name: Code Quality (PHPStan)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  # ── Stages 2,4,5,6: PHP Setup + Tests + Syntax + Artifacts ─────────────────
  test:
    name: Test & Syntax Check
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Syntax Check
        run: |
          php -l index.php
          php -l process.php

      - name: Run Automated Tests
        run: vendor/bin/phpunit tests/FormTest.php --log-junit test-results/junit.xml

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: quickpos-build
          path: |
            index.php
            process.php
            thank-you.html
            tests/
