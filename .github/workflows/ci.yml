name: QuickPOS CI Pipeline

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Syntax Check
        run: php -l index.php

      - name: Run Tests
        # We use 'vendor/bin/phpunit' directly to avoid path errors
        run: vendor/bin/phpunit tests/FormTest.php

      - name: Jira ID Check
        # This will always pass as long as "QP-" is in your last commit message
        run: |
          MSG=$(git log -1 --pretty=%B)
          if [[ "$MSG" == *"QP-"* ]]; then echo "ID Found"; else echo "Missing QP ID"; exit 1; fi