name: QuickPOS CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ feature/* ]

jobs:
  jira-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Validate Jira ID
        run: |
          commit_msg=$(git log -1 --pretty=%B)
          if [[ ! $commit_msg =~ "QP-" ]]; then
            echo "Jira ID missing"
            exit 1
          fi

  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run Syntax Check
        run: php -l index.php
      - name: Run Tests
        # This will run your FormTest.php specifically
        run: ./vendor/bin/phpunit tests/FormTest.php