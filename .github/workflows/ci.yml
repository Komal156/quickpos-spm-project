name: QuickPOS CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ feature/* ]

jobs:
  # Job 1: Validates the Jira ID
  jira-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Check for QP- ID
        run: |
          commit_msg=$(git log -1 --pretty=%B)
          if [[ ! $commit_msg =~ "QP-" ]]; then
            echo "Error: Commit message must include a Jira ID like [QP-50]"
            exit 1
          fi

  # Job 2: Runs everything else
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run Syntax Check
        run: php -l index.php
      - name: Run Automated Tests
        # This tells GitHub to find PHPUnit inside the vendor folder we just installed
        run: vendor/bin/phpunit tests/FormTest.php